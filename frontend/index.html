<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document Q&A AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .btn { background: #6366f1; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: 600; margin-top: 10px; }
        .btn:disabled { background: #334155; }
        #qa-section { display: none; margin-top: 20px; } /* Hidden by default */
        textarea { width: 100%; background: #0f172a; color: white; border: 1px solid #334155; padding: 10px; border-radius: 6px; margin-top: 10px; }
        #response { background: #0f172a; padding: 15px; border-radius: 6px; margin-top: 10px; border-left: 4px solid #6366f1; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Webseeder PDF AI</h1>
        
        <div class="card">
            <input type="file" id="pdfFile" accept=".pdf">
            <button type="button" id="uploadBtn" class="btn">Upload Document</button>
            <p id="status" style="font-size: 0.8rem; color: #94a3b8; margin-top: 10px;"></p>
        </div>

        <div id="qa-section" class="card">
            <h3>Ask a Question</h3>
            <textarea id="questionInput" placeholder="What is this document about?"></textarea>
            <button type="button" id="askBtn" class="btn">Get Answer</button>
            <div id="response" style="display:none"></div>
        </div>
        
        <button type="button" onclick="document.getElementById('qa-section').style.display='block'" style="background:none; border:none; color:#334155; cursor:pointer; font-size:0.7rem">Manual Reveal Q&A</button>
    </div>

    <script>
        const uploadBtn = document.getElementById('uploadBtn');
        const pdfFile = document.getElementById('pdfFile');
        const status = document.getElementById('status');
        const qaSection = document.getElementById('qa-section');
        let docId = "";

        uploadBtn.addEventListener('click', async () => {
            if (!pdfFile.files[0]) return alert("Select a file!");
            
            const formData = new FormData();
            formData.append('file', pdfFile.files[0]);

            status.innerText = "Processing... (Check your terminal)";
            uploadBtn.disabled = true;

            try {
                const res = await fetch('http://127.0.0.1:8000/upload', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (res.ok) {
                    docId = data.document_id;
                    status.innerText = "✅ Success! Ask your question below.";
                    qaSection.style.display = 'block'; // THIS REVEALS THE BOX
                } else {
                    status.innerText = "❌ Error: " + data.detail;
                }
            } catch (e) {
                status.innerText = "❌ Connection Failed! Restart Uvicorn.";
            } finally {
                uploadBtn.disabled = false;
            }
        });

        document.getElementById('askBtn').addEventListener('click', async () => {
            const question = document.getElementById('questionInput').value;
            const respDiv = document.getElementById('response');
            
            respDiv.style.display = "block";
            respDiv.innerText = "AI is thinking...";

            try {
                const res = await fetch('http://127.0.0.1:8000/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ document_id: docId, question: question })
                });
                const data = await res.json();
                respDiv.innerText = data.answer;
            } catch (e) {
                respDiv.innerText = "AI Error. Check Ollama terminal.";
            }
        });
    </script>
</body>
</html>
